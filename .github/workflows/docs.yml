name: Deploy Documentation

on:
  push:
    branches:
      - main
    paths:
      - 'docs_src/**'
      - '**.py'
      - '.github/workflows/docs.yml'
      - 'pyproject.toml'

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sphinx build
        uses: ammaraskar/sphinx-action@master
        with:
          docs-folder: "docs_src"
          # Install dependencies including the package itself for autodoc
          pre-build-command: "pip install . litellm typer rich datasets psutil faiss-cpu chromadb qdrant-client pymilvus lancedb pyarrow weaviate-client duckdb furo"
          build-command: "sphinx-build -b html . ../public"

      - name: Setup Pages
        uses: actions/configure-pages@v4
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './public'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
